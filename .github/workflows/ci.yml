name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile checks
        run: |
          python3 -m py_compile scripts/*.py scripts/lib/*.py modules/*/scripts/*.py

      - name: Run tests
        run: |
          python3 -m pytest tests
