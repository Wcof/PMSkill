<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">PRD Context Skill Kit workflow</title>
  <desc id="desc">A workflow diagram showing source material moving through collect, refine, relate, generate, check, and context delta.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .main { fill: #0f172a; font: 700 24px Arial, sans-serif; }
      .label { fill: #1e293b; font: 700 18px Arial, sans-serif; }
      .sub { fill: #475569; font: 14px Arial, sans-serif; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .accent { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .check { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 12; }
      .delta { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="360"/>
  <text class="main" x="40" y="48">PRD Context Skill Kit</text>
  <text class="sub" x="40" y="74">Turn scattered product context into traceable PRD and Agent context.</text>

  <rect class="panel" x="40" y="125" width="150" height="92"/>
  <text class="label" x="73" y="162">Raw Input</text>
  <text class="sub" x="65" y="188">meetings, chats,</text>
  <text class="sub" x="69" y="207">prototype notes</text>

  <rect class="accent" x="235" y="125" width="120" height="92"/>
  <text class="label" x="265" y="164">Collect</text>
  <text class="sub" x="256" y="191">01-sources</text>

  <rect class="accent" x="400" y="125" width="120" height="92"/>
  <text class="label" x="430" y="164">Refine</text>
  <text class="sub" x="423" y="191">02-refined</text>

  <rect class="accent" x="565" y="125" width="120" height="92"/>
  <text class="label" x="596" y="164">Relate</text>
  <text class="sub" x="584" y="191">03-relations</text>

  <rect class="accent" x="730" y="125" width="120" height="92"/>
  <text class="label" x="758" y="164">Generate</text>
  <text class="sub" x="751" y="191">04-generated</text>

  <rect class="check" x="895" y="125" width="120" height="92"/>
  <text class="label" x="929" y="164">Check</text>
  <text class="sub" x="926" y="191">05-check</text>

  <path class="arrow" d="M190 171 L225 171"/>
  <path class="arrow" d="M355 171 L390 171"/>
  <path class="arrow" d="M520 171 L555 171"/>
  <path class="arrow" d="M685 171 L720 171"/>
  <path class="arrow" d="M850 171 L885 171"/>

  <rect class="delta" x="400" y="260" width="285" height="58"/>
  <text class="label" x="443" y="295">Context Delta</text>
  <text class="sub" x="568" y="295">session changes and next actions</text>
  <path class="arrow" d="M955 220 C920 286, 790 288, 695 289"/>
</svg>
