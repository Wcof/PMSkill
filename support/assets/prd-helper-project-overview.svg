<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-label="一张图教会你 PRD Helper 项目">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="45%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .kicker { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f766e; letter-spacing: 0; }
      .title { font: 800 64px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 30px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 800 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 500 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; }
      .small { font: 600 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .num { font: 800 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#paper)"/>
  <path d="M96 120 C260 52, 460 58, 625 126 C812 204, 1010 192, 1210 112 C1346 58, 1468 58, 1530 102" fill="none" stroke="#99f6e4" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <path d="M92 963 C305 887, 470 918, 650 973 C834 1030, 1020 1027, 1196 951 C1320 897, 1458 888, 1535 929" fill="none" stroke="#bfdbfe" stroke-width="16" stroke-linecap="round" opacity="0.58"/>

  <rect x="82" y="70" width="1436" height="940" rx="34" fill="#ffffff" opacity="0.88" filter="url(#shadow)"/>
  <rect x="82" y="70" width="1436" height="940" rx="34" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <text x="132" y="138" class="kicker">给产品、研发、测试和 Agent 的统一上下文方法</text>
  <text x="132" y="214" class="title">一张图教会你 PRD Helper 项目</text>
  <text x="132" y="260" class="subtitle">把会议、聊天、原型、反馈和历史文档，整理成可追溯、可检查、可复用的 PRD 上下文。</text>
  <rect x="132" y="292" width="530" height="8" rx="4" fill="url(#ink)"/>

  <text x="132" y="368" class="section">怎么用</text>
  <g transform="translate(132 395)">
    <rect x="0" y="0" width="305" height="160" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <circle cx="36" cy="38" r="20" fill="#10b981"/>
    <text x="29" y="46" class="num">1</text>
    <text x="70" y="45" class="label">放入 Skill 目录</text>
    <text x="26" y="92" class="body">让目标 Agent 能读到</text>
    <text x="26" y="124" class="mono">SKILL.md</text>

    <rect x="338" y="0" width="305" height="160" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <circle cx="374" cy="38" r="20" fill="#2563eb"/>
    <text x="367" y="46" class="num">2</text>
    <text x="408" y="45" class="label">给产品材料</text>
    <text x="364" y="92" class="body">会议、反馈、原型</text>
    <text x="364" y="124" class="body">聊天记录、历史文档</text>

    <rect x="676" y="0" width="305" height="160" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <circle cx="712" cy="38" r="20" fill="#f97316"/>
    <text x="705" y="46" class="num">3</text>
    <text x="746" y="45" class="label">按四步处理</text>
    <text x="702" y="92" class="body">采集、精炼、关联</text>
    <text x="702" y="124" class="body">再生成 PRD</text>

    <rect x="1014" y="0" width="305" height="160" rx="20" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <circle cx="1050" cy="38" r="20" fill="#e11d48"/>
    <text x="1043" y="46" class="num">4</text>
    <text x="1084" y="45" class="label">检查输出质量</text>
    <text x="1040" y="92" class="body">结构、关系、生成内容</text>
    <text x="1040" y="124" class="body">都能自动检查</text>
  </g>

  <text x="132" y="640" class="section">项目结构</text>
  <rect x="132" y="668" width="420" height="250" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="166" y="714" class="mono">README.md</text>
  <text x="166" y="748" class="mono">SKILL.md</text>
  <text x="166" y="782" class="mono">modules/</text>
  <text x="166" y="816" class="mono">checks/</text>
  <text x="166" y="850" class="mono">scripts/</text>
  <text x="166" y="884" class="mono">examples/  support/</text>

  <text x="620" y="640" class="section">四个核心模块</text>
  <g transform="translate(620 668)">
    <rect x="0" y="0" width="188" height="116" rx="20" fill="#ccfbf1"/>
    <text x="24" y="42" class="label">Collect</text>
    <text x="24" y="78" class="body">保存原始材料</text>

    <rect x="212" y="0" width="188" height="116" rx="20" fill="#dbeafe"/>
    <text x="236" y="42" class="label">Refine</text>
    <text x="236" y="78" class="body">提炼事实问题</text>

    <rect x="424" y="0" width="188" height="116" rx="20" fill="#fef3c7"/>
    <text x="448" y="42" class="label">Relate</text>
    <text x="448" y="78" class="body">建立关系链路</text>

    <rect x="636" y="0" width="188" height="116" rx="20" fill="#ffe4e6"/>
    <text x="660" y="42" class="label">Generate</text>
    <text x="660" y="78" class="body">生成角色文档</text>

    <path d="M188 58 L212 58" stroke="#64748b" stroke-width="4"/>
    <path d="M400 58 L424 58" stroke="#64748b" stroke-width="4"/>
    <path d="M612 58 L636 58" stroke="#64748b" stroke-width="4"/>
  </g>

  <rect x="620" y="820" width="824" height="98" rx="24" fill="#0f766e"/>
  <text x="654" y="860" class="label white">Checks 是横向质量门禁</text>
  <text x="654" y="894" class="body white">每一步都检查来源、断链、遗漏、推断和待确认问题，最后输出 Context Delta。</text>

  <rect x="132" y="936" width="1312" height="46" rx="23" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <text x="166" y="966" class="small">最终输出：docs/prd-helper/ 目录，包含结构化 PRD、角色化 Agent 上下文、检查报告和 Context Delta。</text>
</svg>
