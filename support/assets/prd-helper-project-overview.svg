<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-label="PRD Helper Skill Kit overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="56%" stop-color="#f6f7ff"/>
      <stop offset="100%" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 800 64px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 25px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 31px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 800 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 500 19px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .small { font: 600 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .monoWhite { font: 800 17px "SFMono-Regular", Consolas, monospace; fill: #ffffff; letter-spacing: 0; }
      .badge { font: 800 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>
  <rect x="80" y="58" width="1440" height="964" rx="30" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
  <rect x="80" y="58" width="1440" height="964" rx="30" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <text x="132" y="140" class="title">PRD Helper Skill Kit</text>
  <text x="132" y="188" class="subtitle">单一 Skill，四个显性模块：采集、精炼、关联、生成。让 Agent 把零散产品上下文变成可追溯 PRD。</text>

  <g transform="translate(132 230)">
    <rect x="0" y="0" width="412" height="82" rx="18" fill="#111827"/>
    <text x="28" y="36" class="monoWhite">npx skills@latest add</text>
    <text x="28" y="64" class="monoWhite">Wcof/PRDContextEngine</text>
    <rect x="436" y="0" width="210" height="82" rx="18" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
    <text x="462" y="34" class="label">选择 Skill</text>
    <text x="462" y="62" class="body">prd-helper</text>
    <rect x="670" y="0" width="300" height="82" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="696" y="34" class="label">选择 Agent</text>
    <text x="696" y="62" class="body">Codex / Claude / Trae</text>
    <rect x="994" y="0" width="324" height="82" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="1020" y="34" class="label">运行初始化</text>
    <text x="1020" y="62" class="mono">/prd-setup</text>
    <path d="M412 41 L436 41" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M646 41 L670 41" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M970 41 L994 41" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="132" y="386" class="section">四模块闭环</text>
  <g transform="translate(132 420)">
    <rect x="0" y="0" width="300" height="154" rx="20" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <rect x="22" y="22" width="74" height="30" rx="15" fill="#0891b2"/>
    <text x="41" y="43" class="badge">01</text>
    <text x="112" y="44" class="label">Collect 采集</text>
    <text x="24" y="88" class="body">主动：/prd-start 后记录会话</text>
    <text x="24" y="118" class="body">被动：投放会议、反馈、旧文档</text>

    <rect x="340" y="0" width="300" height="154" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="362" y="22" width="74" height="30" rx="15" fill="#2563eb"/>
    <text x="381" y="43" class="badge">02</text>
    <text x="452" y="44" class="label">Refine 精炼</text>
    <text x="364" y="88" class="body">事实、目标、决策、约束</text>
    <text x="364" y="118" class="body">问题、冲突、AI 推断</text>

    <rect x="680" y="0" width="300" height="154" rx="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
    <rect x="702" y="22" width="74" height="30" rx="15" fill="#ca8a04"/>
    <text x="721" y="43" class="badge">03</text>
    <text x="792" y="44" class="label">Relate 关联</text>
    <text x="704" y="88" class="body">事实 → 页面 → 功能</text>
    <text x="704" y="118" class="body">规则 → 数据 → 验收</text>

    <rect x="1020" y="0" width="300" height="154" rx="20" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <rect x="1042" y="22" width="74" height="30" rx="15" fill="#e11d48"/>
    <text x="1061" y="43" class="badge">04</text>
    <text x="1132" y="44" class="label">Generate 生成</text>
    <text x="1044" y="88" class="body">PRD、页面、规则、数据</text>
    <text x="1044" y="118" class="body">Agent 上下文与验收</text>

    <path d="M300 77 L340 77" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M640 77 L680 77" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M980 77 L1020 77" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="132" y="652" class="section">产物结构</text>
  <g transform="translate(132 686)">
    <rect x="0" y="0" width="638" height="190" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="label">Skill 仓库结构</text>
    <text x="28" y="82" class="mono">SKILL.md</text>
    <text x="210" y="82" class="body">Skill 根入口</text>
    <text x="28" y="116" class="mono">modules/</text>
    <text x="210" y="116" class="body">四个业务模块</text>
    <text x="28" y="150" class="mono">checks/ + scripts/</text>
    <text x="210" y="150" class="body">质量门禁与自动化</text>

    <rect x="682" y="0" width="638" height="190" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="710" y="44" class="label">项目输出结构</text>
    <text x="710" y="82" class="mono">docs/prd-helper/01-collect</text>
    <text x="710" y="116" class="mono">docs/prd-helper/02-refine</text>
    <text x="710" y="150" class="mono">docs/prd-helper/03-relate → 04-generate → 05-check</text>
  </g>

  <g transform="translate(132 910)">
    <rect x="0" y="0" width="1320" height="64" rx="32" fill="#111827"/>
    <text x="34" y="41" class="small" fill="#ffffff" style="fill:#ffffff">卸载用 /prd-remove：先清理 Agent 配置引用，再卸载 Skill；默认保留 docs/prd-helper/ 业务产物。</text>
  </g>
</svg>
