<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1180" viewBox="0 0 1680 1180" role="img" aria-label="PRD Helper Skill Kit architecture overview">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 60px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 25px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 800 23px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 500 19px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .small { font: 600 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .monoDark { font: 800 17px "SFMono-Regular", Consolas, monospace; fill: #ffffff; letter-spacing: 0; }
      .badge { font: 800 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1680" height="1180" fill="#f8fafc"/>
  <rect x="70" y="58" width="1540" height="1064" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#softShadow)"/>

  <text x="120" y="138" class="title">PRD Helper Skill Kit</text>
  <text x="120" y="184" class="subtitle">单一 Skill / 四个显性模块 / 主动与被动采集 / 可追溯 PRD 上下文</text>

  <g transform="translate(120 232)">
    <rect x="0" y="0" width="356" height="82" rx="8" fill="#111827"/>
    <text x="24" y="35" class="monoDark">npx skills@latest add</text>
    <text x="24" y="63" class="monoDark">Wcof/PRDContextEngine</text>

    <rect x="402" y="0" width="220" height="82" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
    <text x="428" y="35" class="label">安装一个 Skill</text>
    <text x="428" y="63" class="mono">prd-helper</text>

    <rect x="668" y="0" width="250" height="82" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="694" y="35" class="label">运行初始化</text>
    <text x="694" y="63" class="mono">/prd-helper</text>

    <rect x="964" y="0" width="452" height="82" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="990" y="35" class="label">生成项目内命令和配置</text>
    <text x="990" y="63" class="mono">/prd-start /prd-stop /prd-status /prd-remove</text>

    <path d="M356 41 L402 41" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M622 41 L668 41" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M918 41 L964 41" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="120" y="382" class="section">采集入口</text>
  <g transform="translate(120 416)">
    <rect x="0" y="0" width="452" height="174" rx="8" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="26" y="42" class="label">Claude Code</text>
    <text x="26" y="78" class="body">项目命令：.claude/commands/prd-*.md</text>
    <text x="26" y="110" class="body">采集 Hook：.claude/settings.json</text>
    <text x="26" y="142" class="body">start/resume 启用，pause/stop 清理</text>

    <rect x="496" y="0" width="452" height="174" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="522" y="42" class="label">Codex</text>
    <text x="522" y="78" class="body">插件命令：~/.codex/plugins/prd-helper</text>
    <text x="522" y="110" class="body">AGENTS.md 提醒每轮主动写入</text>
    <text x="522" y="142" class="body">stop 扫描 JSONL 会话做兜底补录</text>

    <rect x="992" y="0" width="452" height="174" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
    <text x="1018" y="42" class="label">被动材料</text>
    <text x="1018" y="78" class="body">会议纪要、评审记录、旧 PRD</text>
    <text x="1018" y="110" class="body">客户反馈、原型说明、截图说明</text>
    <text x="1018" y="142" class="mono">docs/prd-helper/01-collect/passive</text>
  </g>

  <text x="120" y="660" class="section">四模块闭环</text>
  <g transform="translate(120 694)">
    <rect x="0" y="0" width="320" height="148" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="2"/>
    <rect x="22" y="20" width="56" height="28" rx="6" fill="#0f766e"/>
    <text x="37" y="40" class="badge">01</text>
    <text x="96" y="43" class="label">Collect 采集</text>
    <text x="24" y="86" class="body">保存原貌，建立 source-index</text>
    <text x="24" y="116" class="body">轻量噪音标记，不提前清洗</text>

    <rect x="374" y="0" width="320" height="148" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <rect x="396" y="20" width="56" height="28" rx="6" fill="#7c3aed"/>
    <text x="411" y="40" class="badge">02</text>
    <text x="470" y="43" class="label">Refine 精炼</text>
    <text x="398" y="86" class="body">事实、目标、决策、约束</text>
    <text x="398" y="116" class="body">问题、冲突、AI 推断</text>

    <rect x="748" y="0" width="320" height="148" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <rect x="770" y="20" width="56" height="28" rx="6" fill="#ea580c"/>
    <text x="785" y="40" class="badge">03</text>
    <text x="844" y="43" class="label">Relate 关联</text>
    <text x="772" y="86" class="body">事实 → 页面 → 功能</text>
    <text x="772" y="116" class="body">规则 → 数据 → 验收</text>

    <rect x="1122" y="0" width="320" height="148" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <rect x="1144" y="20" width="56" height="28" rx="6" fill="#e11d48"/>
    <text x="1159" y="40" class="badge">04</text>
    <text x="1218" y="43" class="label">Generate 生成</text>
    <text x="1146" y="86" class="body">PRD、页面、规则、数据</text>
    <text x="1146" y="116" class="body">Agent 上下文与验收材料</text>

    <path d="M320 74 L374 74" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M694 74 L748 74" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1068 74 L1122 74" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="120" y="912" class="section">质量门禁与源码边界</text>
  <g transform="translate(120 946)">
    <rect x="0" y="0" width="456" height="112" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="24" y="40" class="label">项目产物</text>
    <text x="24" y="76" class="mono">docs/prd-helper/01-collect → 05-check</text>

    <rect x="494" y="0" width="456" height="112" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="518" y="40" class="label">检查脚本</text>
    <text x="518" y="76" class="mono">check-collect/refine/relate/generated</text>

    <rect x="988" y="0" width="456" height="112" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1012" y="40" class="label">共享库</text>
    <text x="1012" y="76" class="mono">constants / id_registry / hooks / discovery</text>
  </g>

  <rect x="120" y="1090" width="1444" height="2" fill="#e2e8f0"/>
  <text x="120" y="1128" class="small">卸载用 /prd-remove：清理 Agent 配置块、Claude 命令与 Hook、Codex 插件引用；默认保留 docs/prd-helper/ 业务文档。</text>
</svg>
