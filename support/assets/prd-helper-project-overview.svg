<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-label="一张图教会你 PRD Helper 安装与四模块流程">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 800 62px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .sub { font: 500 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 30px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 800 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 500 19px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; letter-spacing: 0; }
      .small { font: 600 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; letter-spacing: 0; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .num { font: 800 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>
  <rect x="82" y="62" width="1436" height="956" rx="28" fill="#ffffff" opacity="0.92" filter="url(#shadow)"/>
  <rect x="82" y="62" width="1436" height="956" rx="28" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <text x="132" y="142" class="title">PRD Helper Skill Kit</text>
  <text x="132" y="188" class="sub">用安装器选择 Skill 和 Agent，运行 /prd-setup，然后按四个模块把原始材料转成可追溯 PRD 上下文。</text>

  <text x="132" y="260" class="section">安装与启动</text>
  <g transform="translate(132 292)">
    <rect x="0" y="0" width="300" height="150" rx="18" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <circle cx="34" cy="36" r="19" fill="#0891b2"/>
    <text x="27" y="44" class="num">0</text>
    <text x="66" y="42" class="label">运行安装器</text>
    <text x="24" y="86" class="mono">npx skills@latest add</text>
    <text x="24" y="116" class="mono">Wcof/PRDContextEngine</text>

    <rect x="340" y="0" width="300" height="150" rx="18" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
    <circle cx="374" cy="36" r="19" fill="#4f46e5"/>
    <text x="367" y="44" class="num">1</text>
    <text x="406" y="42" class="label">选择安装目标</text>
    <text x="364" y="86" class="body">选择 prd-helper</text>
    <text x="364" y="116" class="body">选择 Codex / Claude / Trae</text>

    <rect x="680" y="0" width="300" height="150" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <circle cx="714" cy="36" r="19" fill="#16a34a"/>
    <text x="707" y="44" class="num">2</text>
    <text x="746" y="42" class="label">初始化项目</text>
    <text x="704" y="86" class="mono">/prd-setup</text>
    <text x="704" y="116" class="body">确认 docs 目录和采集策略</text>

    <rect x="1020" y="0" width="300" height="150" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <circle cx="1054" cy="36" r="19" fill="#f97316"/>
    <text x="1047" y="44" class="num">3</text>
    <text x="1086" y="42" class="label">开始采集</text>
    <text x="1044" y="86" class="mono">/prd-start</text>
    <text x="1044" y="116" class="body">主动记录 User + Agent</text>

    <path d="M300 75 L340 75" stroke="#64748b" stroke-width="4"/>
    <path d="M640 75 L680 75" stroke="#64748b" stroke-width="4"/>
    <path d="M980 75 L1020 75" stroke="#64748b" stroke-width="4"/>
  </g>

  <text x="132" y="520" class="section">四个业务模块</text>
  <g transform="translate(132 552)">
    <rect x="0" y="0" width="300" height="132" rx="18" fill="#f0fdfa" stroke="#5eead4" stroke-width="2"/>
    <text x="24" y="42" class="label">Collect 采集</text>
    <text x="24" y="78" class="body">主动采集：会话轮次</text>
    <text x="24" y="106" class="body">被动采集：会议、反馈、旧文档</text>

    <rect x="340" y="0" width="300" height="132" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="364" y="42" class="label">Refine 精炼</text>
    <text x="364" y="78" class="body">事实、目标、决策、约束</text>
    <text x="364" y="106" class="body">冲突、问题、AI 推断</text>

    <rect x="680" y="0" width="300" height="132" rx="18" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
    <text x="704" y="42" class="label">Relate 关联</text>
    <text x="704" y="78" class="body">事实 → 页面 / 功能</text>
    <text x="704" y="106" class="body">规则 → 数据 / 验收</text>

    <rect x="1020" y="0" width="300" height="132" rx="18" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <text x="1044" y="42" class="label">Generate 生成</text>
    <text x="1044" y="78" class="body">PRD、页面、规则、数据</text>
    <text x="1044" y="106" class="body">前后端、测试、产品上下文</text>

    <path d="M300 66 L340 66" stroke="#64748b" stroke-width="4"/>
    <path d="M640 66 L680 66" stroke="#64748b" stroke-width="4"/>
    <path d="M980 66 L1020 66" stroke="#64748b" stroke-width="4"/>
  </g>

  <text x="132" y="750" class="section">检查与卸载</text>
  <g transform="translate(132 782)">
    <rect x="0" y="0" width="638" height="136" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="label">质量门禁 Checks</text>
    <text x="28" y="82" class="body">每一步输出 check.md，最终输出 05-check/context-delta.md。</text>
    <text x="28" y="112" class="body">结构、来源、断链、待确认问题和生成内容都可自动检查。</text>

    <rect x="682" y="0" width="638" height="136" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="710" y="44" class="label">卸载 /prd-remove</text>
    <text x="710" y="82" class="body">先清理 AGENTS.md、CLAUDE.md、project_rules.md 中的配置块。</text>
    <text x="710" y="112" class="body">再调用 skills remove；默认保留 docs/prd-helper/ 产物。</text>
  </g>

  <rect x="132" y="944" width="1320" height="46" rx="23" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <text x="166" y="974" class="small">最终输出：docs/prd-helper/，包含四模块中间产物、生成文档、检查报告和 Context Delta。</text>
</svg>
